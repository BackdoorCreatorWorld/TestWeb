<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 BAD GATEWAY • BNN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }
        
        .bnn-svg {
            width: 400px;
            height: auto;
            margin: 0 auto 30px;
            display: block;
        }
        
        .error-502 {
            font-size: 8em;
            font-weight: 900;
            color: #d32f2f;
            margin: 30px 0 10px;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
        }
        
        .bad-gateway {
            font-size: 3em;
            font-weight: bold;
            color: #d32f2f;
            margin: 20px 0;
            text-transform: uppercase;
            border: 4px solid #d32f2f;
            display: inline-block;
            padding: 15px 40px;
            border-radius: 60px;
            letter-spacing: 3px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        hr {
            margin: 40px auto;
            border: none;
            border-top: 3px dashed #d32f2f;
            width: 70%;
        }
        
        .footer {
            font-size: 1.5em;
            color: #333;
            margin: 15px 0;
            font-weight: bold;
        }
        
        .warning {
            font-size: 1.2em;
            color: #d32f2f;
            font-weight: bold;
            margin-top: 30px;
            padding: 10px;
            border: 2px solid #d32f2f;
            display: inline-block;
            border-radius: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- BNN LOGO FROM SERVER -->
        <img src="/bnn-logo" alt="BNN Logo" class="bnn-svg">
        
        <!-- ERROR 502 -->
        <div class="error-502">502</div>
        <div class="bad-gateway">BAD GATEWAY</div>
        
        <hr>
        
        <div class="footer">BADAN NARKOTIKA NASIONAL</div>
        <div class="footer">REPUBLIK INDONESIA</div>
        
        <div class="warning">⚠️ AKSES DITOLAK • ACCESS DENIED ⚠️</div>
    </div>
</body>
</html>
