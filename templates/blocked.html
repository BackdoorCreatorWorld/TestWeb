<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 BAD GATEWAY</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            text-align: center;
            padding: 40px;
            max-width: 800px;
        }
        
        .garuda {
            width: 300px;
            height: auto;
            margin: 0 auto 40px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
        }
        
        .garuda svg {
            width: 100%;
            height: auto;
        }
        
        .error-code {
            font-size: 6em;
            font-weight: bold;
            color: #d32f2f;
            margin: 20px 0;
            letter-spacing: 5px;
        }
        
        .error-title {
            font-size: 2.5em;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
            text-transform: uppercase;
        }
        
        .error-message {
            font-size: 1.2em;
            color: #666;
            margin: 20px 0;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .bnn-text {
            font-size: 1.5em;
            color: #d32f2f;
            margin: 30px 0;
            font-weight: bold;
            border-top: 2px solid #ddd;
            padding-top: 30px;
        }
        
        .bad-gateway {
            font-size: 2em;
            color: #d32f2f;
            font-weight: bold;
            margin: 20px 0;
            text-transform: uppercase;
            border: 3px solid #d32f2f;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
        }
        
        hr {
            margin: 30px 0;
            border: none;
            border-top: 2px dashed #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- GARUDA BNN (Vector) -->
        <div class="garuda">
            <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
                <!-- Background Shield -->
                <path d="M200,50 L320,120 L320,200 L200,270 L80,200 L80,120 L200,50" fill="#f5f5f5" stroke="#d32f2f" stroke-width="4"/>
                
                <!-- Garuda Wings -->
                <path d="M120,120 Q80,80 40,100 Q30,120 50,150 Q80,170 120,160" fill="#d32f2f" opacity="0.8"/>
                <path d="M280,120 Q320,80 360,100 Q370,120 350,150 Q320,170 280,160" fill="#d32f2f" opacity="0.8"/>
                
                <!-- Garuda Body -->
                <circle cx="200" cy="170" r="50" fill="#d32f2f" opacity="0.9"/>
                
                <!-- Garuda Head -->
                <circle cx="200" cy="120" r="30" fill="#d32f2f"/>
                <circle cx="180" cy="110" r="5" fill="white"/>
                <circle cx="220" cy="110" r="5" fill="white"/>
                <circle cx="185" cy="115" r="2" fill="black"/>
                <circle cx="215" cy="115" r="2" fill="black"/>
                
                <!-- Garuda Beak -->
                <polygon points="200,120 210,130 190,130" fill="gold"/>
                
                <!-- BNN Text on Shield -->
                <text x="160" y="200" fill="black" font-size="24" font-weight="bold">BNN</text>
                
                <!-- Decorative Lines -->
                <line x1="150" y1="230" x2="250" y2="230" stroke="gold" stroke-width="3"/>
                <line x1="150" y1="240" x2="250" y2="240" stroke="gold" stroke-width="2"/>
            </svg>
        </div>
        
        <!-- ERROR 502 -->
        <div class="error-code">502</div>
        <div class="error-title">BAD GATEWAY</div>
        
        <hr>
        
        <div class="bad-gateway">BAD GATEWAY</div>
        
        <div class="bnn-text">BADAN NARKOTIKA NASIONAL</div>
        
        <div class="error-message">
            ⚠️ This site has been blocked by BNN<br>
            ⚠️ Situs ini diblokir oleh BNN
        </div>
    </div>
</body>
</html>
